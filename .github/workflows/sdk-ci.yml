# GitHub Actions CI Workflow for SDK Build Checks

name: SDK CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/sdk/**'
      - '.github/workflows/sdk-ci.yml'

jobs:
  build:
    name: Build and Validate SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
